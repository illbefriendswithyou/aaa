<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A2030">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJG Buoy Tracker — Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

<div class="login-container">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-circle">
        <svg width="64" height="64" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="28" fill="none" stroke="#E63329" stroke-width="5" stroke-dasharray="60 88"/>
          <circle cx="32" cy="32" r="28" fill="none" stroke="#2E7FC7" stroke-width="5" stroke-dasharray="60 88" stroke-dashoffset="-60"/>
          <circle cx="32" cy="32" r="28" fill="none" stroke="#4BAE48" stroke-width="5" stroke-dasharray="56 92" stroke-dashoffset="-120"/>
          <text x="32" y="38" text-anchor="middle" font-size="20" font-weight="800" fill="#2C3340" font-family="'Segoe UI',sans-serif">kjg</text>
        </svg>
      </div>
      <div class="logo-text-wrap">
        <div class="logo-brand">KJG TRACKER</div>
        <div class="logo-tagline">Buoy Monitoring System</div>
      </div>
    </div>

    <h1 class="login-title">Selamat datang</h1>
    <p class="login-sub">Masuk untuk memantau buoy Anda</p>

    <div id="alert-box" class="alert-box" style="display:none"></div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input class="form-input" type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input class="form-input" type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
          <button type="button" class="toggle-pass" onclick="togglePassword()">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btn-login">
        <span id="btn-text">Masuk</span>
        <span id="btn-loading" style="display:none">
          <span class="spinner"></span> Memverifikasi...
        </span>
      </button>
    </form>

    <p class="login-footer">KJG &copy; 2026 — Sistem Monitoring Buoy</p>
  </div>

  <div class="login-visual">
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
    <div class="buoy-anim">
      <svg width="80" height="120" viewBox="0 0 80 120">
        <ellipse cx="40" cy="100" rx="30" ry="8" fill="#2E7FC7" opacity="0.3"/>
        <rect x="30" y="50" width="20" height="50" rx="4" fill="#E63329" opacity="0.8"/>
        <ellipse cx="40" cy="50" rx="20" ry="10" fill="#E63329"/>
        <ellipse cx="40" cy="50" rx="14" ry="7" fill="#fff" opacity="0.3"/>
        <line x1="40" y1="20" x2="40" y2="50" stroke="#2C3340" stroke-width="2"/>
        <polygon points="40,20 60,30 40,35" fill="#4BAE48" opacity="0.9"/>
        <circle cx="40" cy="100" r="3" fill="#2E7FC7" opacity="0.5">
          <animate attributeName="r" values="3;20;3" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
        </circle>
      </svg>
    </div>
    <div class="visual-text">
      <h2>Pantau Buoy Anda</h2>
      <p>Sistem pelacakan real-time dengan notifikasi pencurian dan monitoring posisi GPS</p>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('[PWA] Service Worker terdaftar'))
        .catch((err) => console.log('[PWA] Gagal daftar SW:', err));
    });
  }
</script>
</body>
</html>
